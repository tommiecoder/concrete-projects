<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Concrete Chronicles</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --yellow: #E9DA7A;
      --bg: #0D0D0D;
      --border: #1E1E1E;
      --muted: #666666;
    }
    body {
      background: var(--bg);
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 20px;
      text-align: center;
      padding: 24px;
    }
    h1 {
      font-size: 100px;
      font-weight: 900;
      color: var(--yellow);
      letter-spacing: -6px;
      line-height: 1;
    }
    p {
      color: var(--muted);
      font-size: 14px;
    }
    a {
      font-size: 12px;
      font-weight: 700;
      color: var(--yellow);
      border: 1px solid rgba(233,218,122,0.2);
      padding: 9px 22px;
      border-radius: 8px;
      text-decoration: none;
      margin-top: 4px;
    }
    a:hover { background: rgba(233,218,122,0.08); }
  </style>
</head>
<body>
  <h1>404</h1>
  <p>This page doesn't exist.</p>
  <a href="/">← Back to index</a>
</body>
</html>
